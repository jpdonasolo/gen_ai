
experiment_name: "instruct_withvqa_lora32_lr1.0e-5_bs32"
model: "Qwen/Qwen3.5-0.8B"
cache_dir: "huggingface"
max_train_samples: null

replay:
  epigraph_k: 200
  rp_max_len: 256
  merge_with_vqa: True

lora:
  r: 32
  lora_alpha: 32

training:
  num_train_epochs: 1
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_steps: 50
  weight_decay: 5.0e-6

  per_device_train_batch_size: 2
  gradient_accumulation_steps: 32
  gradient_checkpointing: true
  report_to: "wandb"
