# Replay-style training (epigraph + RedPajama). Use: python -m train_with_augmentation --config configs/replay_augmentation.yaml

experiment_name: "replay-run"
model: "Qwen/Qwen3.5-0.8B-Base"
cache_dir: "huggingface"
max_train_samples: null

replay:
  epigraph_k: 200
  # Truncation for RedPajama; SFT max_length defaults to this if not set under training.
  rp_max_len: 256

lora:
  r: 64
  lora_alpha: 64

collate:
  mask_prompt: false

training:
  per_device_train_batch_size: 2
  gradient_checkpointing: true
  report_to: "wandb"
  # If omitted, max_length is set from replay.rp_max_len in the training script.
  # max_length: 256
